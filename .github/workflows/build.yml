name: Build RobloxWebSite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest  # Change from ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
     
      - name: Install .NET Framework Targeting Pack
        run: |
           # Install the .NET Framework 4.7.2 developer pack
           choco install netfx-4.7.2-devpack -y
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
            vs-version: '17.0'
      - name: Create dynamic folders
        shell: pwsh
        run: |
          $root = Split-Path "${{ github.workspace }}" -Parent
          New-Item -ItemType Directory -Force -Path (Join-Path $root 'packages') | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $root 'Assemblies') | Out-Null
          Write-Host "Created folders:"
          Write-Host "  $(Join-Path $root 'packages')"
          Write-Host "  $(Join-Path $root 'Assemblies')"

      - name: Generate stubs
        shell: pwsh
        run: |
          $root = Split-Path "${{ github.workspace }}" -Parent
          & "${{ github.workspace }}/.github/scripts/Generate-Stubs.ps1" -AssembliesRoot (Join-Path $root 'Assemblies')

      - name: Restore dependencies
        shell: pwsh
        run: |
          $root = Split-Path "${{ github.workspace }}" -Parent
          $packagesDir = Join-Path $root 'packages'
          dotnet restore "${{ github.workspace }}/RobloxWebSite.sln" --packages $packagesDir

      - name: Build site
        shell: pwsh
        run: |
          dotnet build "${{ github.workspace }}/RobloxWebSite.sln" --configuration Release --no-restore

      - name: Publish build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: roblox-website-build
          path: RobloxWebSite/bin/
